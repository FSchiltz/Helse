name: Build docker
on:
  workflow_call:
    inputs:
      tags:
        required: false
        type: string
      labels:
        required: false
        type: string
      push:
        required: true
        type: boolean
        
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  
jobs:
    build:
      runs-on: ${{ matrix.os }}
      strategy:
        matrix:
          include:
            - os: ubuntu-latest
              arch: amd64
            - os: ubuntu-24.04-arm
              arch: arm64 
      steps:
      - uses: actions/checkout@v4.1.4

      - name: Log in to the Container registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        if: ${{ inputs.push }}
        uses: docker/metadata-action@v5.5.1 
        with:
          images: ghcr.io/fschiltz/helse
      
      - name: Build
        run: |
            docker build --tag ${{ inputs.tags || steps.meta.outputs.tags }} ${{matrix.arch}}  .
            
      - name: Push
        if: ${{ inputs.push }}
        run: |
            docker push ${{env.USER}}/${{ inputs.tags || steps.meta.outputs.tags }} ${{matrix.arch}} 
              
    docker_manifest:
      needs: build
      runs-on: ubuntu-latest      
      if: ${{ inputs.push }}
      steps:
        - name: 
          uses: docker/login-action@v4
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
            
        - name: Create and push manifest
          run: |
              docker manifest create ${{env.USER}}/${{ inputs.tags || steps.meta.outputs.tags }} ${{env.USER}}/${{ inputs.tags || steps.meta.outputs.tags }}:amd64 ${{env.USER}}/${{ inputs.tags || steps.meta.outputs.tags }}:arm64
              docker manifest push ${{env.USER}}/${{ inputs.tags || steps.meta.outputs.tags }}
