name: Build Android
on:
  workflow_call:
    inputs:
      push:
        required: true
        type: boolean
      upload:
        required: true
        type: boolean
      
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PROPERTIES_PATH: "flutter_frontend/android/key.properties"
  
jobs:
  build:
    runs-on: ubuntu-latest    
    steps:
    - name: Dump secret
      run: echo -n "${{ secrets.KEY_STORE }}" | base64
    
    - uses: actions/checkout@v6.0.2

    - uses: actions/setup-java@v5.2.0
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install Flutter
      uses: subosito/flutter-action@v2.14.0
      id: flutter-action
      with:
        channel: stable
        cache: true
        flutter-version: '3.44.4'
        
    - name: Create certificat
      run: |
        echo keyPassword=${{ secrets.KEY_STORE }} > ${{env.PROPERTIES_PATH}}
        echo storePassword=${{ secrets.KEY_PASSWORD }} >> ${{env.PROPERTIES_PATH}}
        echo keyAlias=${{ vars.KEY_ALIAS }} >> ${{env.PROPERTIES_PATH}}
        echo storeFile=key.jks >> ${{env.PROPERTIES_PATH}}
        
    - name: Decoding base64 key into a file
      run: echo ${{ secrets.KEY_FILE }} | base64 --decode > flutter_frontend/android/app/key.jks

    - name: Build release app bundle    
      run: flutter build apk --release --split-per-abi --split-debug-info=build/symbols
      working-directory: 'flutter_frontend'   

    - name: Rename APK Artifacts
      run: |        
          cd flutter_frontend/build/app/outputs/flutter-apk 
          ls -l         
          find . -name '*-release.apk' -print 
          mv app-armeabi-v7a-release.apk helse-${{ github.event.release.tag_name }}-armeabi-v7a.apk
          mv app-arm64-v8a-release.apk helse-${{ github.event.release.tag_name }}-arm64-v8a.apk
          mv app-x86_64-release.apk helse-${{ github.event.release.tag_name }}-x86_64.apk   
          ls -l     

    - name: Upload artefact
      if: ${{ inputs.push }}
      uses: actions/upload-artifact@v7.0.1   
      with:
        path: flutter_frontend/build/app/outputs/flutter-apk/*-arm64-v8a.apk
        archive: false
        if-no-files-found: error

    - name: Finding binaries files
      if: ${{ inputs.upload }}
      id: finding-files        
      run: |
        {
          cd flutter_frontend/build/app/outputs/flutter-apk
          echo 'FILELIST<<EOF'
          find . -name '*.apk' -print 
          echo EOF
        } >> "$GITHUB_ENV"
      
    - name: Upload binaries to release
      if: ${{ inputs.upload }}
      run: |
        cd flutter_frontend/build/app/outputs/flutter-apk
        for i in $FILELIST; do        
          gh release upload ${{github.event.release.tag_name}} ${i}   
        done  
      env:
        GH_TOKEN: ${{ github.token }}
    
      
