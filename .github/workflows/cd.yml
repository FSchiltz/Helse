name: CD

on:
  push:
    branches: [ "main" ]
    
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  
jobs:
  build-android:
    permissions:
      contents: read 
    uses: ./.github/workflows/build-android.yml
    with:
      push: true
      sign: true
      upload: false

    secrets: inherit

  build-docker-x86:
    permissions:
      contents: read 
      packages: write
    uses: ./.github/workflows/build-docker.yml
    with:
      push: true
      platform: linux/amd64
      
  build-docker-arm:
    permissions:
      contents: read 
      packages: write
    uses: ./.github/workflows/build-docker.yml
    with:
      push: true
      platform: linux/arm64
